<!DOCTYPE html>
<html>
<head>
    <title>My Local AI</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; }
        #chatbox { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Local LLM Chat</h2>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Ask me anything..." style="width: 80%;">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatbox = document.getElementById('chatbox');
            
            chatbox.innerHTML += `<p><b>You:</b> ${input.value}</p>`;
            
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: input.value})
            });
            
            const data = await response.json();
            chatbox.innerHTML += `<p><b>AI:</b> ${data.response}</p>`;
            input.value = '';
        }
    </script>
</body>
</html>
